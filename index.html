}

  {id:'stf1',name:'K. Kaminski',username:'kkaminski',pin:'3030',role:'staff'},
  {id:'stf2',name:'A. Cuba-Rivera',username:'acubarivera',pin:'1010',role:'staff'},
  {id:'stf3',name:'A. Pineda',username:'apineda',pin:'8008',role:'staff'},
  {id:'stf4',name:'B. Ombiji',username:'bombiji',pin:'0229',role:'staff'},
];
const ACTIVITIES=['Tutoring','Sports','Art & Crafts','STEM Club','Reading Circle','Music','Drama','Community Service'];

function initData(){
  if(!lsGet('afcll_v2_students')) lsSet('afcll_v2_students',DEF_STUDENTS);
  if(!lsGet('afcll_v2_att')) lsSet('afcll_v2_att',[]);
  if(!lsGet('afcll_v2_hw')) lsSet('afcll_v2_hw',[]);
  if(!lsGet('afcll_v2_acts')) lsSet('afcll_v2_acts',[]);
  if(!lsGet('afcll_v2_staff')) lsSet('afcll_v2_staff',DEF_STAFF);
}

function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function weekDates(){
  const d=new Date(),day=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));
  return Array.from({length:5},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x.toISOString().slice(0,10);});
}
function initials(name){return name.split(' ').map(n=>n[0]).join('').toUpperCase();}
function avatarBg(id){return['#003087','#C8102E','#0a4db5','#7c3aed','#0891b2','#059669'][parseInt(id.replace(/\D/g,''))%6];}

const {useState,useEffect}=React;

function Avatar({name,id,size=40}){
  return <div style={{width:size,height:size,borderRadius:'50%',background:avatarBg(id),display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:size*0.38,flexShrink:0}}>{initials(name)}</div>;
}
function Card({children,style={},onClick}){
  return <div onClick={onClick} style={{background:'#fff',borderRadius:12,boxShadow:'0 2px 16px rgba(0,48,135,0.10)',padding:'1.25rem',cursor:onClick?'pointer':'auto',...style}}>{children}</div>;
}
function Badge({children,color='var(--navy)'}){
  return <span style={{background:color+'22',color,fontSize:'0.7rem',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,padding:'2px 8px',borderRadius:99,letterSpacing:'0.05em',textTransform:'uppercase'}}>{children}</span>;
}
function Btn({children,onClick,variant='primary',size='md',style={},disabled=false}){
  const sz={sm:{fontSize:'0.8rem',padding:'5px 12px'},md:{fontSize:'0.9rem',padding:'8px 18px'},lg:{fontSize:'1.1rem',padding:'12px 28px'}};
  const vr={primary:{background:'var(--navy)',color:'#fff'},gold:{background:'var(--gold)',color:'var(--navy)'},
    red:{background:'var(--red)',color:'#fff'},ghost:{background:'transparent',color:'var(--navy)',border:'2px solid var(--navy)'},
    success:{background:'#22c55e',color:'#fff'},danger:{background:'#ef4444',color:'#fff'}};
  return <button onClick={onClick} disabled={disabled} style={{border:'none',borderRadius:8,fontWeight:700,cursor:disabled?'not-allowed':'pointer',opacity:disabled?0.5:1,transition:'all .15s',...sz[size],...vr[variant],...style}}>{children}</button>;
}

// ── LOGIN ────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [mode,setMode]=useState('select');
  const [usernameInput,setUsernameInput]=useState('');
  const [input,setInput]=useState('');
  const [error,setError]=useState('');
  const [pinMode,setPinMode]=useState('pin');
  const PAD=['1','2','3','4','5','6','7','8','9','','0','\u232b'];

  const go=()=>{
    const students=DEF_STUDENTS;
    const staffList=DEF_STAFF;
    if(mode==='student'){
      const f=pinMode==='pin'
        ?students.find(s=>s.pin===input||s.pin===input.padStart(4,'0')||s.pin.replace(/^0+/,'')===input.replace(/^0+/,''))
        :students.find(s=>s.username.toLowerCase()===usernameInput.toLowerCase().trim());
      if(f){onLogin({role:'student',user:f});}else setError(pinMode==='pin'?'PIN not found.':'Username not found.');
    } else if(mode==='staff'){
      // Staff login: username + PIN
      const staffMember=staffList.find(s=>s.username.toLowerCase()===usernameInput.toLowerCase().trim()&&(s.pin===input||s.pin===input.padStart(4,'0')||s.pin.replace(/^0+/,'')===input.replace(/^0+/,'')));
      if(staffMember){
        onLogin({role:staffMember.role==='admin'?'admin':'staff',user:staffMember});
      } else {
        setError('Username or PIN not found.');
      }
    } else {
      const f=students.find(s=>s.parentPin===input);
      if(f)onLogin({role:'parent',user:f});else setError('Parent PIN not found.');
    }
  };

  const numPad=(val,setter,max=4)=>(
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.5rem',maxWidth:220,margin:'0 auto'}}>
      {PAD.map((k,i)=>(
        <button key={i} onClick={()=>{
          if(!k)return;
          if(k==='\u232b'){setter(p=>p.slice(0,-1));}
          else if(val.length<max){setter(p=>p+k);}
        }} style={{padding:'0.85rem',fontSize:'1.3rem',fontWeight:700,borderRadius:10,border:'none',
          background:k?'rgba(255,255,255,0.12)':'transparent',color:'white',cursor:k?'pointer':'default',
          opacity:k?1:0,fontFamily:"'Barlow Condensed',sans-serif"}}>
          {k}
        </button>
      ))}
    </div>
  );

  const pinDots=(val,max=4)=>(
    <div style={{display:'flex',gap:10,justifyContent:'center',margin:'1rem 0'}}>
      {Array.from({length:max}).map((_,i)=>(
        <div key={i} style={{width:14,height:14,borderRadius:'50%',
          background:i<val.length?'var(--gold)':'rgba(255,255,255,0.25)',transition:'background 0.15s'}}/>
      ))}
    </div>
  );

  const cardStyle={background:'rgba(255,255,255,0.07)',borderRadius:16,padding:'2rem',
    width:'100%',maxWidth:340,display:'flex',flexDirection:'column',alignItems:'center',gap:'0.5rem'};

  if(mode==='select') return(
    <div style={{minHeight:'100vh',background:'var(--navy)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem'}}>
      <img src={LOGO} alt="" style={{width:100,height:100,objectFit:'contain',marginBottom:'1rem'}}/>
      <h1 style={{color:'var(--gold)',fontSize:'2rem',textAlign:'center',lineHeight:1.1,fontFamily:"'Barlow Condensed',sans-serif"}}>AFCLL ACADEMY</h1>
      <p style={{color:'rgba(255,255,255,0.6)',fontSize:'0.9rem',marginBottom:'2.5rem',textAlign:'center',fontFamily:"'Barlow Condensed',sans-serif"}}>AFC Lancaster Lions Initiative</p>
      <div style={{display:'flex',flexDirection:'column',gap:'0.75rem',width:'100%',maxWidth:300}}>
        {[['student','👩‍🎓','Student','Check in & track your day'],['staff','👩‍💼','Staff / Admin','Manage attendance & students'],['parent','👨‍👩‍👧','Parent','View your child\u2019s progress']].map(([r,icon,label,sub])=>(
          <button key={r} onClick={()=>{setMode(r);setInput('');setUsernameInput('');setError('');}}
            style={{background:'rgba(255,255,255,0.09)',border:'1.5px solid rgba(255,255,255,0.15)',borderRadius:12,
              padding:'1rem 1.2rem',display:'flex',alignItems:'center',gap:'1rem',cursor:'pointer',color:'white',textAlign:'left'}}>
            <span style={{fontSize:'1.6rem'}}>{icon}</span>
            <div><div style={{fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.05rem'}}>{label}</div>
              <div style={{fontSize:'0.75rem',color:'rgba(255,255,255,0.5)'}}>{sub}</div></div>
          </button>
        ))}
      </div>
    </div>
  );

  if(mode==='student') return(
    <div style={{minHeight:'100vh',background:'var(--navy)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem'}}>
      <div style={cardStyle}>
        <img src={LOGO} alt="" style={{width:56,height:56,objectFit:'contain',marginBottom:'0.25rem'}}/>
        <h2 style={{color:'var(--gold)',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.4rem',marginBottom:0}}>Student Login</h2>
        {pinMode==='pin'?(
          <>
            <p style={{color:'rgba(255,255,255,0.6)',fontSize:'0.8rem',margin:'0.25rem 0 0'}}>Enter your 4-digit PIN</p>
            {pinDots(input)}
            {numPad(input,setInput)}
          </>
        ):(
          <>
            <p style={{color:'rgba(255,255,255,0.6)',fontSize:'0.8rem',margin:'0.25rem 0'}}>Enter your username</p>
            <input value={usernameInput} onChange={e=>setUsernameInput(e.target.value)}
              placeholder="e.g. jwilliams" autoFocus
              onKeyDown={e=>e.key==='Enter'&&go()}
              style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'none',fontSize:'1rem',textAlign:'center',outline:'none'}}/>
          </>
        )}
        {error&&<p style={{color:'#f87171',fontSize:'0.82rem',margin:'0.25rem 0'}}>{error}</p>}
        <Btn variant="gold" onClick={go} style={{width:'100%',marginTop:'0.5rem'}}>Login</Btn>
        <button onClick={()=>{setPinMode(m=>m==='pin'?'username':'pin');setInput('');setUsernameInput('');setError('');}}
          style={{background:'none',border:'none',color:'rgba(255,255,255,0.5)',cursor:'pointer',fontSize:'0.8rem',marginTop:4}}>
          {pinMode==='pin'?'Use username instead':'Use PIN instead'}
        </button>
        <button onClick={()=>setMode('select')} style={{background:'none',border:'none',color:'rgba(255,255,255,0.4)',cursor:'pointer',fontSize:'0.78rem'}}>← Back</button>
      </div>
    </div>
  );

  if(mode==='staff') return(
    <div style={{minHeight:'100vh',background:'var(--navy)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem'}}>
      <div style={cardStyle}>
        <img src={LOGO} alt="" style={{width:56,height:56,objectFit:'contain',marginBottom:'0.25rem'}}/>
        <h2 style={{color:'var(--gold)',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.4rem',marginBottom:0}}>Staff / Admin Login</h2>
        <p style={{color:'rgba(255,255,255,0.6)',fontSize:'0.8rem',margin:'0.25rem 0'}}>Enter your username and PIN</p>
        <input value={usernameInput} onChange={e=>setUsernameInput(e.target.value)}
          placeholder="Username" autoFocus
          style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'none',fontSize:'1rem',outline:'none'}}/>
        <p style={{color:'rgba(255,255,255,0.5)',fontSize:'0.78rem',marginTop:'0.5rem',marginBottom:0}}>PIN</p>
        {pinDots(input)}
        {numPad(input,setInput)}
        {error&&<p style={{color:'#f87171',fontSize:'0.82rem',margin:'0.25rem 0'}}>{error}</p>}
        <Btn variant="gold" onClick={go} style={{width:'100%',marginTop:'0.5rem'}}>Login</Btn>
        <button onClick={()=>setMode('select')} style={{background:'none',border:'none',color:'rgba(255,255,255,0.4)',cursor:'pointer',fontSize:'0.78rem',marginTop:4}}>← Back</button>
      </div>
    </div>
  );

  // Parent login
  return(
    <div style={{minHeight:'100vh',background:'var(--navy)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem'}}>
      <div style={cardStyle}>
        <img src={LOGO} alt="" style={{width:56,height:56,objectFit:'contain',marginBottom:'0.25rem'}}/>
        <h2 style={{color:'var(--gold)',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.4rem',marginBottom:0}}>Parent Login</h2>
        <p style={{color:'rgba(255,255,255,0.6)',fontSize:'0.8rem',margin:'0.25rem 0 0'}}>Enter your parent PIN</p>
        {pinDots(input)}
        {numPad(input,setInput)}
        {error&&<p style={{color:'#f87171',fontSize:'0.82rem',margin:'0.25rem 0'}}>{error}</p>}
        <Btn variant="gold" onClick={go} style={{width:'100%',marginTop:'0.5rem'}}>Login</Btn>
        <button onClick={()=>setMode('select')} style={{background:'none',border:'none',color:'rgba(255,255,255,0.4)',cursor:'pointer',fontSize:'0.78rem',marginTop:4}}>← Back</button>
      </div>
    </div>
  );
}

// ── STUDENT ──────────────────────────────────────────────────────────────────
function StudentDashboard({session,onLogout}){
  const {user}=session;
  const [tab,setTab]=useState('checkin');
  const [att,setAtt]=useState(()=>lsGet('afcll_v2_att')||[]);
  const [hw,setHw]=useState(()=>lsGet('afcll_v2_hw')||[]);
  const [acts,setActs]=useState(()=>lsGet('afcll_v2_acts')||[]);
  const [toast,setToast]=useState('');
  const [hwSubj,setHwSubj]=useState('');const[hwNote,setHwNote]=useState('');
  const [selAct,setSelAct]=useState('');

  const toast_show=(m)=>{setToast(m);setTimeout(()=>setToast(''),2800);};
  const myAtt=att.filter(a=>a.studentId===user.id);
  const todayAtt=myAtt.find(a=>a.date===today());
  const todayHW=hw.filter(h=>h.studentId===user.id&&h.date===today());
  const todayActs=acts.filter(a=>a.studentId===user.id&&a.date===today());
  const wDates=weekDates();
  const thisWeek=wDates.filter(d=>myAtt.find(a=>a.date===d)).length;

  const checkIn=()=>{
    if(todayAtt){toast_show('Already checked in today!');return;}
    const r={id:Date.now()+'',studentId:user.id,date:today(),time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),confirmed:false,staffAdded:false};
    const u=[...att,r];setAtt(u);lsSet('afcll_v2_att',u);
    syncToSheets('logAttendance',{...r,studentName:user.name,grade:user.grade});
    toast_show('✅ Checked in! Waiting for staff confirmation.');
  };
  const isConfirmed=todayAtt&&(todayAtt.confirmed===true||todayAtt.staffAdded===true);
  const isPending=todayAtt&&!isConfirmed;
  const addHW=()=>{
    if(!hwSubj.trim())return;
    const r={id:Date.now()+'',studentId:user.id,date:today(),subject:hwSubj.trim(),note:hwNote.trim(),completed:false};
    const u=[...hw,r];setHw(u);lsSet('afcll_v2_hw',u);setHwSubj('');setHwNote('');
    syncToSheets('logHomework',{...r,studentName:user.name,grade:user.grade});
    toast_show('📚 Homework logged!');
  };
  const toggleHW=(id)=>{const u=hw.map(h=>h.id===id?{...h,completed:!h.completed}:h);setHw(u);lsSet('afcll_v2_hw',u);};
  const logAct=()=>{
    if(!selAct)return;
    const r={id:Date.now()+'',studentId:user.id,date:today(),activity:selAct};
    const u=[...acts,r];setActs(u);lsSet('afcll_v2_acts',u);setSelAct('');
    syncToSheets('logActivity',{...r,studentName:user.name,grade:user.grade});
    toast_show('🏆 Activity logged!');
  };

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      <div style={{background:'var(--navy)',padding:'0.875rem 1.25rem',display:'flex',alignItems:'center',gap:'0.75rem'}}>
        <img src={LOGO} alt="" style={{width:34,height:34,objectFit:'contain'}}/>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",color:'var(--gold)',fontWeight:800,fontSize:'1rem',letterSpacing:'0.06em'}}>AFCLL ACADEMY</div>
          <div style={{color:'rgba(255,255,255,0.65)',fontSize:'0.75rem'}}>Welcome, {user.name.split(' ')[0]}! · {user.grade} Grade</div>
        </div>
        <Btn variant="ghost" size="sm" style={{borderColor:'rgba(255,255,255,0.35)',color:'#fff',fontSize:'0.75rem'}} onClick={onLogout}>Sign Out</Btn>
      </div>

      {toast&&<div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',
        background:'#1a2340',color:'#fff',padding:'9px 18px',borderRadius:99,
        fontWeight:600,fontSize:'0.88rem',zIndex:999,boxShadow:'0 4px 20px rgba(0,0,0,0.25)',
        fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'0.03em',whiteSpace:'nowrap'}}>{toast}</div>}

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'0.6rem',padding:'0.875rem'}}>
        {[{l:'This Week',v:`${thisWeek}/5`,c:'var(--navy)'},{l:'Total Days',v:myAtt.length,c:'var(--success)'},
          {l:"Today's HW",v:todayHW.length,c:'var(--gold)'},{l:'Activities',v:todayActs.length,c:'var(--red)'}].map(s=>(
          <Card key={s.l} style={{padding:'0.6rem',textAlign:'center'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.5rem',fontWeight:800,color:s.c,lineHeight:1}}>{s.v}</div>
            <div style={{fontSize:'0.65rem',color:'var(--muted)',fontWeight:500,marginTop:2}}>{s.l}</div>
          </Card>
        ))}
      </div>

      <div style={{display:'flex',gap:3,padding:'0 0.875rem',marginBottom:'0.6rem'}}>
        {[['checkin','Check-In'],['homework',isConfirmed?'Homework':'\ud83d\udd12 Homework'],['activities',isConfirmed?'Activities':'\ud83d\udd12 Activities'],['history','History']].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:'7px 2px',border:'none',borderRadius:7,
            fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'0.78rem',cursor:'pointer',
            background:tab===t?'var(--navy)':'transparent',color:tab===t?'#fff':'var(--muted)'}}>
            {l}
          </button>
        ))}
      </div>

      <div style={{padding:'0 0.875rem 5rem'}}>
        {tab==='checkin'&&(
          <Card>
            <h3 style={{fontSize:'1.3rem',marginBottom:'0.2rem'}}>Daily Check-In</h3>
            <p style={{color:'var(--muted)',fontSize:'0.82rem',marginBottom:'1.25rem'}}>{fmtDate(today())}</p>
            {todayAtt?(
              <div style={{textAlign:'center',padding:'1.25rem 0'}}>
                <div style={{fontSize:'2.5rem',marginBottom:6}}>{isConfirmed?'✅':'⏳'}</div>
                <h3 style={{color:isConfirmed?'var(--success)':'#b45309',fontSize:'1.4rem'}}>{isConfirmed?"You're confirmed in!":'Pending Confirmation'}</h3>
                <p style={{color:'var(--muted)',fontSize:'0.82rem',marginTop:4}}>Checked in at {todayAtt.time}</p>
                {isPending&&<p style={{fontSize:'0.79rem',color:'#92400e',background:'#fef3c7',borderRadius:6,padding:'6px 10px',marginTop:8}}>A staff member needs to confirm your check-in to unlock Homework & Activities.</p>}
              </div>
            ):(
              <div style={{textAlign:'center',padding:'1.25rem 0'}}>
                <div style={{fontSize:'2.5rem',marginBottom:6}}>👋</div>
                <h3 style={{fontSize:'1.3rem',marginBottom:'0.4rem'}}>Ready to check in?</h3>
                <p style={{color:'var(--muted)',fontSize:'0.82rem',marginBottom:'1.25rem'}}>Tap below to record your attendance for today</p>
                <Btn variant="gold" size="lg" onClick={checkIn} style={{fontSize:'1.1rem',padding:'13px 36px'}}>✓ Check In Now</Btn>
              </div>
            )}
            <div style={{marginTop:'1.25rem',borderTop:'1px solid var(--border)',paddingTop:'1rem'}}>
              <p style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'0.78rem',color:'var(--muted)',marginBottom:'0.6rem',letterSpacing:'0.07em',textTransform:'uppercase'}}>This Week</p>
              <div style={{display:'flex',gap:6}}>
                {wDates.map(d=>{
                  const p=!!myAtt.find(a=>a.date===d),isT=d===today(),isPast=d<=today();
                  return(
                    <div key={d} style={{flex:1,textAlign:'center'}}>
                      <div style={{fontSize:'0.62rem',color:'var(--muted)',marginBottom:3,fontWeight:600}}>
                        {new Date(d+'T12:00').toLocaleDateString('en-US',{weekday:'short'})[0]}
                      </div>
                      <div style={{width:'100%',aspectRatio:'1',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.85rem',
                        background:p?'var(--success)':isT?'var(--gold)':'var(--bg)',
                        border:isT&&!p?'2px solid var(--gold)':'2px solid transparent'}}>
                        {p?'✓':isT?'·':isPast?'—':''}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </Card>
        )}

        {tab==='homework'&&!isConfirmed&&(
        <div style={{display:'flex',flexDirection:'column',gap:'0.6rem'}}>
          <Card style={{textAlign:'center',padding:'2rem 1.5rem'}}>
            <div style={{fontSize:'2.8rem',marginBottom:'0.75rem'}}>\ud83d\udd12</div>
            <h3 style={{fontSize:'1.15rem',color:'var(--navy)',marginBottom:'0.5rem'}}>Homework Locked</h3>
            <p style={{color:'var(--muted)',fontSize:'0.83rem',lineHeight:1.6}}>A staff member needs to confirm your check-in before you can log homework.</p>
            {isPending?<p style={{color:'#b45309',fontSize:'0.82rem',fontWeight:600,marginTop:'0.875rem',background:'#fffbeb',borderRadius:8,padding:'0.5rem'}}>\u23f3 Your check-in is submitted — ask a staff member to confirm it.</p>:<p style={{color:'#ef4444',fontSize:'0.82rem',marginTop:'0.875rem'}}>You haven\'t checked in yet today. Go to Check-In first.</p>}
          </Card>
        </div>
      )}
      {tab==='homework'&&isConfirmed&&(
          <div style={{display:'flex',flexDirection:'column',gap:'0.6rem'}}>
            <Card>
              <h3 style={{fontSize:'1.3rem',marginBottom:'0.7rem'}}>Log Homework</h3>
              <input value={hwSubj} onChange={e=>setHwSubj(e.target.value)} placeholder="Subject (e.g. Math, Reading)"
                style={{width:'100%',padding:'9px 12px',border:'2px solid var(--border)',borderRadius:8,fontSize:'0.9rem',marginBottom:7,outline:'none'}}/>
              <textarea value={hwNote} onChange={e=>setHwNote(e.target.value)} placeholder="Notes (optional)"
                style={{width:'100%',padding:'9px 12px',border:'2px solid var(--border)',borderRadius:8,fontSize:'0.85rem',resize:'vertical',minHeight:60,marginBottom:7,outline:'none'}}/>
              <Btn variant="primary" onClick={addHW} disabled={!hwSubj.trim()}>+ Add Homework</Btn>
            </Card>
            <Card>
              <h3 style={{fontSize:'1.2rem',marginBottom:'0.7rem'}}>Today ({todayHW.length})</h3>
              {todayHW.length===0&&<p style={{color:'var(--muted)',fontSize:'0.88rem'}}>Nothing logged today yet.</p>}
              {todayHW.map(h=>(
                <div key={h.id} style={{display:'flex',gap:'0.7rem',alignItems:'flex-start',padding:'0.65rem',background:'var(--bg)',borderRadius:8,marginBottom:6}}>

function exportDOEExcel(students, att, hw, acts) {
  const XL = window.XLSX;
  if (!XL) { alert('SheetJS not loaded. Refresh and try again.'); return; }
  function getPDays(s, e) {
    const days=[]; let cur=new Date(s+'T12:00:00'); const end=new Date(e+'T12:00:00');
    while(cur<=end){if(cur.getDay()>=1&&cur.getDay()<=4)days.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
    return days;
  }
  const HOURS=2.5;
  const attDates=[...new Set(att.map(a=>a.date))].sort();
  const syStart=attDates.length?attDates[0]:'2025-09-02';
  const syEnd=attDates.length?attDates[attDates.length-1]:new Date().toISOString().slice(0,10);
  const pDays=getPDays(syStart,syEnd);
  const wb=XL.utils.book_new();

  // Sheet 1: PA 21C Daily Attendance
  const aoa=[];
  const r1=['PA 21st Century Daily Program Attendance Tracking Form',null,null,null,'Total students attending daily →',null];
  pDays.forEach(d=>r1.push(att.filter(a=>a.date===d).length));
  r1.push(null,null,null,'Total SY Days Offered','Total SY Hours Offered');
  aoa.push(r1);
  const r2=['Complete one row per student.',null,null,null,'Enter dates in Row 5.'];
  pDays.forEach(()=>r2.push('SY Program'));
  r2.push(null,null,null,pDays.length,pDays.length*HOURS);
  aoa.push(r2);
  aoa.push([]);
  const r4=[null,null,null,null,'Hours offered this date →'];
  pDays.forEach(()=>r4.push(HOURS));
  aoa.push(r4);
  const r5=['PA Secure ID','Last Name','First Name','Grade','21st CCLC Center Assignment'];
  pDays.forEach(d=>r5.push(new Date(d+'T12:00:00')));
  r5.push(null,null,null,'Number of SY DAYS Attended','Number of SY HOURS Attended','% of SY Time Attended','Total Days','Total Hours');
  aoa.push(r5);
  aoa.push([]);
  students.forEach((s,si)=>{
    const myA=att.filter(a=>a.studentId===s.id);
    const grade=s.grade.replace(/th|st|nd|rd/,'');
    const row=['AFCLL-00'+(si+1),s.name.split(' ')[1]||s.name,s.name.split(' ')[0],grade,'AFCLL Academy - AFC Lancaster'];
    let syD=0,syH=0;
    pDays.forEach(d=>{const p=myA.find(a=>a.date===d);row.push(p?HOURS:null);if(p){syD++;syH+=HOURS;}});
    row.push(null,null,null,syD,syH,pDays.length>0?Math.round(syD/pDays.length*1000)/10+'%':'-',syD,syH);
    aoa.push(row);
  });
  const wsA=XL.utils.aoa_to_sheet(aoa);
  wsA['!cols']=[{wch:12},{wch:14},{wch:14},{wch:8},{wch:36},...pDays.map(()=>({wch:9})),{wch:4},{wch:4},{wch:4},{wch:22},{wch:24},{wch:20},{wch:12},{wch:14}];
  XL.utils.book_append_sheet(wb,wsA,'Daily Attendance-Enter Here');

  // Sheet 2: Student Summary
  const s2=[['PA Secure ID','Last Name','First Name','Grade','Center','Total SY Days','Total SY Hours','% Attendance','HW Submitted','HW Completed','HW %','Activities']];
  students.forEach((s,si)=>{
    const myA=att.filter(a=>a.studentId===s.id);
    const myH=hw.filter(h=>h.studentId===s.id);
    const myAc=acts.filter(a=>a.studentId===s.id);
    const syD=myA.length,syH=syD*HOURS,pct=pDays.length>0?Math.round(syD/pDays.length*1000)/10:0;
    const hwD=myH.filter(h=>h.completed).length;
    s2.push(['AFCLL-00'+(si+1),s.name.split(' ')[1]||s.name,s.name.split(' ')[0],s.grade,'AFCLL Academy - AFC Lancaster',syD,syH,pct+'%',myH.length,hwD,myH.length>0?Math.round(hwD/myH.length*1000)/10+'%':'N/A',myAc.length]);
  });
  const wsS=XL.utils.aoa_to_sheet(s2);
  wsS['!cols']=[{wch:12},{wch:14},{wch:14},{wch:8},{wch:36},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:10},{wch:12}];
  XL.utils.book_append_sheet(wb,wsS,'Student Summary');

  // Sheet 3: Monthly Summary
  const months={};
  att.forEach(a=>{const m=a.date.slice(0,7);if(!months[m])months[m]=new Set();months[m].add(a.studentId);});
  const s3=[['Month','Total Students','Days Operated','Hours Operated']];
  Object.keys(months).sort().forEach(m=>{
    const daysInMo=[...new Set(att.filter(a=>a.date.startsWith(m)).map(a=>a.date))].length;
    s3.push([new Date(m+'-15').toLocaleDateString('en-US',{month:'long',year:'numeric'}),months[m].size,daysInMo,daysInMo*HOURS]);
  });
  const wsM=XL.utils.aoa_to_sheet(s3);
  wsM['!cols']=[{wch:20},{wch:18},{wch:16},{wch:16}];
  XL.utils.book_append_sheet(wb,wsM,'Monthly Summary');

  XL.writeFile(wb,'AFCLL_21C_Attendance_'+new Date().toISOString().slice(0,10)+'.xlsx');
}


function SheetsSetup({students}){
  const [url,setUrl]=React.useState(()=>getSheetsURL());
  const [saved,setSaved]=React.useState(false);

  const save=()=>{
    setSheetsURL(url.trim());
    setSaved(true);
    setTimeout(()=>setSaved(false),2500);
    if(url.trim()){
      syncToSheets('syncStudents',{students:students.map(s=>({id:s.id,name:s.name,grade:s.grade,username:s.username}))});
    }
  };

  return(
    <div>

        style={{width:'100%',padding:'9px 12px',border:'2px solid var(--border)',borderRadius:8,fontSize:'0.8rem',marginBottom:8,outline:'none',fontFamily:'monospace'}}/>
      <div style={{display:'flex',gap:8,marginBottom:'0.875rem'}}>
        <Btn variant="primary" onClick={save}>{saved?'✓ Saved!':'Save & Sync'}</Btn>
        {url&&<Btn variant="danger" size="sm" onClick={()=>{setUrl('');setSheetsURL('');}}>Clear</Btn>}
      </div>
      {getSheetsURL()&&(
        <div style={{background:'#f0fdf4',borderRadius:8,padding:'0.75rem',border:'2px solid var(--success)',marginBottom:'0.875rem'}}>
          <p style={{fontSize:'0.82rem',color:'var(--success)',fontWeight:600}}>✅ Sheets sync is active. All data syncs automatically.</p>
        </div>
      )}
      <div style={{background:'#fffbeb',borderRadius:8,padding:'0.875rem',border:'2px solid var(--gold)'}}>
        <p style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'0.85rem',color:'var(--navy)',marginBottom:6}}>Quick Setup Steps</p>
        <ol style={{paddingLeft:'1.25rem',fontSize:'0.8rem',color:'var(--text)',lineHeight:2}}>
          <li>Open your Google Sheet</li>
          <li>Click Extensions → Apps Script</li>
          <li>Paste the Apps Script code, click Save</li>
          <li>Run "setupSheets" once to create tabs</li>
          <li>Click Deploy → New Deployment → Web App</li>
          <li>Set "Who has access" to Anyone → Deploy</li>
          <li>Copy the Web App URL and paste it above</li>
        </ol>
      </div>
    </div>
  );
}

function StaffDashboard({session,onLogout}){
  const [tab,setTab]=useState('confirm');
  const [students]=useState(()=>lsGet('afcll_v2_students')||DEF_STUDENTS);
  const [att,setAtt]=useState(()=>lsGet('afcll_v2_att')||[]);
  const [hw]=useState(()=>lsGet('afcll_v2_hw')||[]);
  const [acts]=useState(()=>lsGet('afcll_v2_acts')||[]);
  const [selDate,setSelDate]=useState(today());
  const [selStudent,setSelStudent]=useState(null);
  const [toast,setToast]=useState('');
  const toast_show=(m)=>{setToast(m);setTimeout(()=>setToast(''),2800);};

  const todayPresent=att.filter(a=>a.date===today());
  const selPresent=att.filter(a=>a.date===selDate);
  const totalDays=[...new Set(att.map(a=>a.date))].length;

  const markPresent=(sid)=>{
    if(att.find(a=>a.studentId===sid&&a.date===selDate))return;
    const r={id:Date.now()+'',studentId:sid,date:selDate,time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),staffAdded:true,confirmed:true};
    const u=[...att,r];setAtt(u);lsSet('afcll_v2_att',u);
    const ms=students.find(x=>x.id===sid);
    if(ms) syncToSheets('logAttendance',{...r,studentName:ms.name,grade:ms.grade});
    toast_show('✅ Marked present!');
  };
  const confirmAtt=(attId)=>{
    const u=att.map(a=>a.id===attId?{...a,confirmed:true,confirmedBy:session.user.name,confirmedAt:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}:a);
    setAtt(u);lsSet('afcll_v2_att',u);toast_show('✅ Confirmed!');
  };
  const unconfirmAtt=(attId)=>{
    const u=att.map(a=>a.id===attId?{...a,confirmed:false,confirmedBy:null}:a);
    setAtt(u);lsSet('afcll_v2_att',u);toast_show('Confirmation removed.');
  };
  const pendingToday=att.filter(a=>a.date===today()&&!a.confirmed&&!a.staffAdded);
  const confirmedToday=att.filter(a=>a.date===today()&&(a.confirmed||a.staffAdded));
  const removePresent=(sid)=>{const u=att.filter(a=>!(a.studentId===sid&&a.date===selDate));setAtt(u);lsSet('afcll_v2_att',u);toast_show('Removed.');};

  const exportCSV=(type)=>{
    let rows,name;
    if(type==='att'){
      rows=[['Date','Student','Grade','Check-in Time','Staff Added']];
      att.forEach(a=>{const s=students.find(x=>x.id===a.studentId);if(s)rows.push([a.date,s.name,s.grade,a.time||'',a.staffAdded?'Yes':'No']);});
      name=`afcll-attendance-${today()}.csv`;
    } else if(type==='hw'){
      rows=[['Date','Student','Subject','Note','Completed']];
      hw.forEach(h=>{const s=students.find(x=>x.id===h.studentId);if(s)rows.push([h.date,s.name,h.subject,h.note||'',h.completed?'Yes':'No']);});

    } else {
      rows=[['Date','Student','Activity']];
      acts.forEach(a=>{const s=students.find(x=>x.id===a.studentId);if(s)rows.push([a.date,s.name,a.activity]);});
      name=`afcll-activities-${today()}.csv`;
    }
    const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const el=document.createElement('a');el.href=url;el.download=name;el.click();
    toast_show('📥 Exported!');
  };

        <div style={{flex:1}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",color:'var(--gold)',fontWeight:800,fontSize:'1rem',letterSpacing:'0.06em'}}>STAFF DASHBOARD</div>
          <div style={{color:'rgba(255,255,255,0.65)',fontSize:'0.75rem'}}>AFCLL Academy · {fmtDate(today())}</div>
        </div>

                  <Btn variant="primary" size="sm" onClick={()=>markPresent(s.id)}>Mark Present</Btn>
                </div>
              ))}
              {students.filter(s=>!att.find(a=>a.studentId===s.id&&a.date===today())).length===0&&(
                <p style={{color:'var(--muted)',fontSize:'0.83rem',textAlign:'center',padding:'0.5rem'}}>All students accounted for today.</p>
              )}
            </Card>
          </div>
        )}
                {tab==='confirm'&&(
          <div style={{display:'flex',flexDirection:'column',gap:'0.6rem'}}>
            <Card>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.75rem'}}>
                <h3 style={{fontSize:'1.2rem'}}>Today's Check-Ins</h3>
                <span style={{fontSize:'0.78rem',color:'var(--muted)'}}>{fmtDate(today())}</span>
              </div>
              {pendingToday.length===0&&confirmedToday.length===0&&(
                <p style={{textAlign:'center',color:'var(--muted)',fontSize:'0.85rem',padding:'1.5rem 0'}}>No check-ins yet today.</p>
              )}
              {pendingToday.map(a=>{const s=students.find(x=>x.id===a.studentId);return s?(
                <div key={a.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.65rem',background:'#fffbeb',borderRadius:8,marginBottom:6,border:'1.5px solid #fcd34d'}}>
                  <div><p style={{fontWeight:600,fontSize:'0.86rem'}}>{s.name}</p><p style={{color:'var(--muted)',fontSize:'0.74rem'}}>Gr {s.grade} - {a.time} - Pending</p></div>
                  <Btn variant="success" size="sm" onClick={()=>confirmAtt(a.id)}>Confirm</Btn>
                </div>
              ):null;})}
              {confirmedToday.map(a=>{const s=students.find(x=>x.id===a.studentId);return s?(
                <div key={a.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.65rem',background:'#f0fdf4',borderRadius:8,marginBottom:6,border:'1.5px solid #86efac'}}>
                  <div><p style={{fontWeight:600,fontSize:'0.86rem'}}>{s.name}</p><p style={{color:'var(--muted)',fontSize:'0.74rem'}}>Gr {s.grade} - Confirmed {a.confirmedAt||a.time}</p></div>
                  <Btn variant="ghost" size="sm" onClick={()=>unconfirmAtt(a.id)}>Undo</Btn>
                </div>
              ):null;})}
            </Card>
            <Card>
              <h3 style={{fontSize:'1.05rem',marginBottom:'0.5rem'}}>Not checked in today</h3>
              {students.filter(s=>!att.find(a=>a.studentId===s.id&&a.date===today())).map(s=>(
                <div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.6rem',background:'var(--bg)',borderRadius:8,marginBottom:5}}>
                  <span style={{fontSize:'0.84rem'}}>{s.name} - Gr {s.grade}</span>
                  <Btn variant="primary" size="sm" onClick={()=>markPresent(s.id)}>Mark Present</Btn>
                </div>
              ))}
            </Card>
          </div>
        )}
                {tab==='overview'&&(
          <div style={{display:'flex',flexDirection:'column',gap:'0.6rem'}}>
            <Card>
              <h3 style={{fontSize:'1.25rem',marginBottom:'0.7rem'}}>Weekly Attendance Grid</h3>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.82rem',minWidth:360}}>
                  <thead>
                    <tr>
                      <th style={{textAlign:'left',padding:'5px 7px',color:'var(--muted)',fontWeight:600,fontSize:'0.72rem',textTransform:'uppercase'}}>Student</th>
                      {weekDates().map(d=>(
                        <th key={d} style={{textAlign:'center',padding:'5px 3px',color:'var(--muted)',fontWeight:600,fontSize:'0.68rem',textTransform:'uppercase'}}>
                          {new Date(d+'T12:00').toLocaleDateString('en-US',{weekday:'short'})}
                        </th>
                      ))}
                      <th style={{textAlign:'center',padding:'5px 7px',color:'var(--muted)',fontWeight:600,fontSize:'0.72rem',textTransform:'uppercase'}}>#</th>
                    </tr>
                  </thead>
                  <tbody>
                    {students.map(s=>{
                      const wk=weekDates().map(d=>!!att.find(a=>a.studentId===s.id&&a.date===d));
                      return(
                        <tr key={s.id} style={{borderTop:'1px solid var(--border)'}}>
                          <td style={{padding:'7px',fontWeight:500,fontSize:'0.82rem'}}>{s.name.split(' ')[0]} {s.name.split(' ')[1][0]}.</td>
                          {wk.map((p,i)=>(
                            <td key={i} style={{textAlign:'center',padding:'7px 3px'}}>
                              <span style={{display:'inline-flex',width:22,height:22,borderRadius:5,alignItems:'center',justifyContent:'center',
                                background:p?'var(--success)':'var(--border)',fontSize:'0.7rem',color:p?'#fff':'transparent'}}>{p?'✓':''}</span>
                            </td>
                          ))}
                          <td style={{textAlign:'center',padding:'7px',fontWeight:700,color:'var(--navy)',fontSize:'0.9rem'}}>{wk.filter(Boolean).length}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </Card>
            <Card>
              <h3 style={{fontSize:'1.2rem',marginBottom:'0.7rem'}}>7-Day Trend</h3>
              <div style={{display:'flex',gap:5,alignItems:'flex-end',height:72}}>
                {last7.map(d=>{
                  const cnt=att.filter(a=>a.date===d).length;
                  const pct=students.length?cnt/students.length:0;
                  return(
                    <div key={d} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                      <div style={{width:'100%',background:d===today()?'var(--navy)':'var(--navy-light)',borderRadius:'4px 4px 0 0',height:Math.max(4,pct*58)+'px',opacity:d===today()?1:0.5}}/>
                      <span style={{fontSize:'0.58rem',color:'var(--muted)'}}>{new Date(d+'T12:00').toLocaleDateString('en-US',{weekday:'short'})[0]}</span>
                    </div>
                  );
                })}
              </div>
            </Card>
            <Card>
              <h3 style={{fontSize:'1.2rem',marginBottom:'0.7rem'}}>Recent Homework</h3>
              {hw.slice(-5).reverse().map(h=>{
                const s=students.find(x=>x.id===h.studentId);
                return s?(
                  <div key={h.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.45rem 0',borderBottom:'1px solid var(--border)'}}>
                    <div><span style={{fontWeight:600,fontSize:'0.88rem'}}>{s.name.split(' ')[0]}</span><span style={{color:'var(--muted)',fontSize:'0.82rem',marginLeft:7}}>{h.subject}</span></div>
                    <Badge color={h.completed?'var(--success)':'var(--warn)'}>{h.completed?'Done':'Pending'}</Badge>
                  </div>
                ):null;
              })}
              {hw.length===0&&<p style={{color:'var(--muted)',fontSize:'0.88rem'}}>No homework logged yet.</p>}
            </Card>
          </div>
        )}

        {tab==='attendance'&&(
          <Card>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.7rem',flexWrap:'wrap',gap:8}}>
              <h3 style={{fontSize:'1.25rem'}}>Mark Attendance</h3>
              <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)}
                style={{padding:'6px 10px',border:'2px solid var(--border)',borderRadius:8,fontSize:'0.88rem',outline:'none'}}/>
            </div>
            <p style={{color:'var(--muted)',fontSize:'0.8rem',marginBottom:'0.7rem'}}>{selPresent.length}/{students.length} present — {fmtDate(selDate)}</p>
            {students.map(s=>{
              const present=!!selPresent.find(a=>a.studentId===s.id);
              return(
                <div key={s.id} style={{display:'flex',alignItems:'center',gap:'0.7rem',padding:'0.55rem 0',borderBottom:'1px solid var(--border)'}}>
                  <Avatar name={s.name} id={s.id} size={34}/>
                  <div style={{flex:1}}>
                    <p style={{fontWeight:600,fontSize:'0.88rem'}}>{s.name}</p>
                    <p style={{color:'var(--muted)',fontSize:'0.75rem'}}>{s.grade} Grade</p>
                  </div>
                  {present?<Btn variant="success" size="sm" onClick={()=>removePresent(s.id)}>✓ Present</Btn>:
                    <Btn variant="ghost" size="sm" onClick={()=>markPresent(s.id)}>Mark Present</Btn>}
                </div>
              );
            })}
          </Card>
        )}

        {tab==='students'&&(
          <div>
            {selStudent?(
              <>
                <button onClick={()=>setSelStudent(null)} style={{background:'none',border:'none',color:'var(--navy)',cursor:'pointer',fontWeight:600,marginBottom:'0.7rem',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'0.9rem'}}>← All Students</button>
                <div style={{display:'flex',flexDirection:'column',gap:'0.6rem'}}>
                  <Card>
                    <div style={{display:'flex',alignItems:'center',gap:'1rem',marginBottom:'1rem'}}>
                      <Avatar name={selStudent.name} id={selStudent.id} size={52}/>
                      <div><h2 style={{fontSize:'1.5rem'}}>{selStudent.name}</h2><p style={{color:'var(--muted)'}}>{selStudent.grade} Grade · @{selStudent.username}</p></div>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.6rem'}}>
                      {[{l:'Days Present',v:att.filter(a=>a.studentId===selStudent.id).length,c:'var(--success)'},
                        {l:'HW Complete',v:(()=>{const h=hw.filter(x=>x.studentId===selStudent.id);return h.length?Math.round(h.filter(x=>x.completed).length/h.length*100)+'%':'N/A';})(),c:'var(--gold)'},
                        {l:'Activities',v:acts.filter(a=>a.studentId===selStudent.id).length,c:'var(--navy)'}].map(s=>(
                        <div key={s.l} style={{textAlign:'center',padding:'0.65rem',background:'var(--bg)',borderRadius:8}}>
                          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.7rem',fontWeight:800,color:s.c}}>{s.v}</div>
                          <div style={{fontSize:'0.68rem',color:'var(--muted)',fontWeight:500}}>{s.l}</div>
                        </div>
                      ))}
                    </div>
                  </Card>
                  <Card>
                    <h3 style={{fontSize:'1.2rem',marginBottom:'0.65rem'}}>Attendance</h3>
                    {att.filter(a=>a.studentId===selStudent.id).slice().reverse().slice(0,8).map(a=>(
                      <div key={a.id} style={{display:'flex',justifyContent:'space-between',padding:'0.4rem 0',borderBottom:'1px solid var(--border)'}}>
                        <span style={{fontSize:'0.85rem'}}>{fmtDate(a.date)}</span><Badge color="var(--success)">Present</Badge>
                      </div>
                    ))}
                  </Card>
                  <Card>
                    <h3 style={{fontSize:'1.2rem',marginBottom:'0.65rem'}}>Activities</h3>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                      {acts.filter(a=>a.studentId===selStudent.id).slice(-12).map(a=><Badge key={a.id} color="var(--navy)">{a.activity}</Badge>)}
                    </div>
                    {acts.filter(a=>a.studentId===selStudent.id).length===0&&<p style={{color:'var(--muted)',fontSize:'0.88rem'}}>No activities logged.</p>}
                  </Card>
                </div>
              </>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:'0.6rem'}}>
                {students.map(s=>{
                  const aCnt=att.filter(a=>a.studentId===s.id).length;
                  const hwDone=hw.filter(h=>h.studentId===s.id&&h.completed).length;
                  const hwTot=hw.filter(h=>h.studentId===s.id).length;
                  const todayIn=!!att.find(a=>a.studentId===s.id&&a.date===today());
                  return(
                    <Card key={s.id} onClick={()=>setSelStudent(s)}>
                      <div style={{display:'flex',alignItems:'center',gap:'0.75rem'}}>
                        <Avatar name={s.name} id={s.id} size={42}/>
                        <div style={{flex:1}}>
                          <div style={{display:'flex',alignItems:'center',gap:7}}>
                            <p style={{fontWeight:700}}>{s.name}</p>
                            {todayIn&&<Badge color="var(--success)">Today ✓</Badge>}
                          </div>
                          <p style={{color:'var(--muted)',fontSize:'0.78rem'}}>{s.grade} · @{s.username}</p>
                        </div>
                        <div style={{textAlign:'right'}}>
                          <p style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.25rem',color:'var(--navy)'}}>{aCnt}</p>
                          <p style={{fontSize:'0.65rem',color:'var(--muted)'}}>days</p>
                        </div>
                      </div>
                      <div style={{display:'flex',gap:'1rem',marginTop:'0.65rem',paddingTop:'0.65rem',borderTop:'1px solid var(--border)',fontSize:'0.78rem'}}>
                        <span>📚 <strong>{hwDone}/{hwTot}</strong> HW</span>
                        <span>🏆 <strong>{acts.filter(a=>a.studentId===s.id).length}</strong> activities</span>
                      </div>
                    </Card>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {tab==='reports'&&(
          <div style={{display:'flex',flexDirection:'column',gap:'0.6rem'}}>
            <Card style={{border:'3px solid var(--navy)'}}>
              <div style={{display:'flex',alignItems:'center',gap:'0.75rem',marginBottom:'0.75rem'}}>
                <div style={{background:'var(--navy)',borderRadius:8,padding:'8px 10px',flexShrink:0,fontSize:'1.4rem'}}>📋</div>
                <div>
                  <h3 style={{fontSize:'1.25rem',color:'var(--navy)'}}>PA 21C DOE Compliance Export</h3>
                  <p style={{color:'var(--muted)',fontSize:'0.76rem'}}>Official PA 21st Century CCLC Daily Attendance Tracking Form (.xlsx)</p>
                </div>
              </div>
              <div style={{background:'#eff6ff',borderRadius:8,padding:'0.7rem',marginBottom:'0.8rem',border:'1px solid #bfdbfe'}}>
                <p style={{fontSize:'0.78rem',color:'#1e40af',fontWeight:700,marginBottom:4}}>What\'s included:</p>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'2px 8px',fontSize:'0.76rem',color:'#374151'}}>
                  {['Daily Attendance (PA 21C format)','Student Summary with hours & %','Monthly compliance summary','All attendance from app data'].map(x=>(
                    <span key={x}>✓ {x}</span>
                  ))}
                </div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                <div>
                  <p style={{fontSize:'0.82rem'}}><strong>{students.length}</strong> students · <strong>{att.length}</strong> records</p>
                  <p style={{fontSize:'0.74rem',color:'var(--muted)'}}>AFCLL Academy · AFC Lancaster Lions Initiative</p>
                </div>
                <Btn variant="primary" size="lg" onClick={()=>exportDOEExcel(students,att,hw,acts)} style={{fontSize:'0.95rem',padding:'10px 18px'}}>⬇ Export DOE Excel</Btn>
              </div>
            </Card>
            <Card>
              <h3 style={{fontSize:'1.25rem',marginBottom:'0.5rem'}}>Quick CSV Exports</h3>
              <p style={{color:'var(--muted)',fontSize:'0.8rem',marginBottom:'0.9rem'}}>Individual data tables as CSV.</p>
              {[['att','📅 Attendance','All attendance with timestamps'],
                ['hw','📚 Homework','Homework logs and completion'],
                ['acts','🏆 Activities','Activity participation records']].map(([t,l,d])=>(
                <div key={t} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.65rem',background:'var(--bg)',borderRadius:8,marginBottom:6}}>
                  <div><p style={{fontWeight:600,fontSize:'0.86rem'}}>{l}</p><p style={{color:'var(--muted)',fontSize:'0.76rem'}}>{d}</p></div>
                  <Btn variant="ghost" size="sm" onClick={()=>exportCSV(t)}>Export CSV</Btn>
                </div>
              ))}
            </Card>
            <Card>
              <h3 style={{fontSize:'1.2rem',marginBottom:'0.7rem'}}>Student Summary</h3>
              {students.map(s=>{
                const a=att.filter(x=>x.studentId===s.id).length;
                const ac=acts.filter(x=>x.studentId===s.id).length;
                const h=hw.filter(x=>x.studentId===s.id);
                const pct=h.length?Math.round(h.filter(x=>x.completed).length/h.length*100):0;
                return(
                  <div key={s.id} style={{padding:'0.65rem 0',borderBottom:'1px solid var(--border)'}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{fontWeight:600,fontSize:'0.9rem'}}>{s.name}</span>
                      <span style={{fontSize:'0.78rem',color:'var(--muted)'}}>{s.grade}</span>
                    </div>
                    <div style={{display:'flex',gap:'0.9rem',fontSize:'0.8rem',flexWrap:'wrap'}}>
                      <span>📅 {a} days</span><span>🏆 {ac} activities</span><span>📚 {pct}% HW</span>
                    </div>
                  </div>
                );
              })}
            </Card>
          </div>
        )}

        {tab==='settings'&&(
          <div style={{display:'flex',flexDirection:'column',gap:'0.6rem'}}>
            <Card>
              <h3 style={{fontSize:'1.3rem',marginBottom:'0.75rem'}}>📊 Google Sheets Integration</h3>
              <SheetsSetup students={students}/>
            </Card>
          </div>
        )}
      </div>
    </div>
  );
}

// ── PARENT ───────────────────────────────────────────────────────────────────
function ParentDashboard({session,onLogout}){
  const {user}=session;
  const att=lsGet('afcll_v2_att')||[];
  const hw=lsGet('afcll_v2_hw')||[];
  const acts=lsGet('afcll_v2_acts')||[];
  const myAtt=att.filter(a=>a.studentId===user.id);
  const myHW=hw.filter(h=>h.studentId===user.id);
  const myActs=acts.filter(a=>a.studentId===user.id);
  const todayAtt=myAtt.find(a=>a.date===today());
  const thisWeek=weekDates().filter(d=>myAtt.find(a=>a.date===d)).length;
  const hwPct=myHW.length?Math.round(myHW.filter(h=>h.completed).length/myHW.length*100):0;
  const recentActs=[...new Set(myActs.slice(-6).map(a=>a.activity))];

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      <div style={{background:'var(--navy)',padding:'0.875rem 1.25rem',display:'flex',alignItems:'center',gap:'0.75rem'}}>
        <img src={LOGO} alt="" style={{width:34,height:34,objectFit:'contain'}}/>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",color:'var(--gold)',fontWeight:800,fontSize:'1rem',letterSpacing:'0.06em'}}>PARENT PORTAL</div>
          <div style={{color:'rgba(255,255,255,0.65)',fontSize:'0.75rem'}}>{user.name}</div>
        </div>
        <Btn variant="ghost" size="sm" style={{borderColor:'rgba(255,255,255,0.35)',color:'#fff',fontSize:'0.75rem'}} onClick={onLogout}>Sign Out</Btn>
      </div>
      <div style={{padding:'0.875rem',display:'flex',flexDirection:'column',gap:'0.6rem'}}>
        <Card style={{background:'var(--navy)',color:'#fff'}}>
          <div style={{display:'flex',alignItems:'center',gap:'1rem'}}>
            <Avatar name={user.name} id={user.id} size={50}/>
            <div>
              <h2 style={{fontSize:'1.4rem',color:'var(--gold)',fontFamily:"'Barlow Condensed',sans-serif"}}>{user.name}</h2>
              <p style={{color:'rgba(255,255,255,0.65)',fontSize:'0.82rem'}}>{user.grade} Grade · AFC Lancaster Lions</p>
              <div style={{marginTop:5}}><Badge color={todayAtt?'#22c55e':'#f59e0b'}>{todayAtt?'✓ Present Today':'Not Yet Checked In'}</Badge></div>
            </div>
          </div>
        </Card>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.6rem'}}>
          {[{i:'📅',l:'This Week',v:`${thisWeek}/5`,c:'var(--navy)'},
            {i:'📚',l:'HW Completion',v:hwPct+'%',sub:`${myHW.filter(h=>h.completed).length}/${myHW.length} tasks`,c:'var(--gold)'},
            {i:'✅',l:'Total Days',v:myAtt.length,c:'var(--success)'},
            {i:'🏆',l:'Activities',v:myActs.length,c:'var(--red)'}].map(s=>(
            <Card key={s.l} style={{textAlign:'center',padding:'0.9rem'}}>
              <div style={{fontSize:'1.4rem'}}>{s.i}</div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.5rem',fontWeight:800,color:s.c,lineHeight:1.1}}>{s.v}</div>
              {s.sub&&<div style={{fontSize:'0.7rem',color:'var(--muted)'}}>{s.sub}</div>}
              <div style={{fontSize:'0.68rem',color:'var(--muted)',marginTop:2}}>{s.l}</div>
            </Card>
          ))}
        </div>
        <Card>
          <h3 style={{fontSize:'1.2rem',marginBottom:'0.65rem'}}>This Week</h3>
          <div style={{display:'flex',gap:6}}>
            {weekDates().map(d=>{
              const p=!!myAtt.find(a=>a.date===d),isT=d===today();
              return(
                <div key={d} style={{flex:1,textAlign:'center'}}>
                  <div style={{fontSize:'0.62rem',color:'var(--muted)',marginBottom:3,fontWeight:600}}>{new Date(d+'T12:00').toLocaleDateString('en-US',{weekday:'short'})[0]}</div>
                  <div style={{width:'100%',aspectRatio:'1',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.85rem',
                    background:p?'var(--success)':isT?'var(--gold)':'var(--bg)',border:isT&&!p?'2px solid var(--gold)':'2px solid var(--border)'}}>
                    {p?'✓':''}
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
        <Card>
          <h3 style={{fontSize:'1.2rem',marginBottom:'0.65rem'}}>Recent Homework</h3>
          {myHW.slice(-5).reverse().map(h=>(
            <div key={h.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.45rem 0',borderBottom:'1px solid var(--border)'}}>
              <div><span style={{fontWeight:600,fontSize:'0.88rem'}}>{h.subject}</span><span style={{color:'var(--muted)',fontSize:'0.78rem',marginLeft:7}}>{fmtDate(h.date)}</span></div>
              <Badge color={h.completed?'var(--success)':'var(--warn)'}>{h.completed?'Done':'Pending'}</Badge>
            </div>
          ))}
          {myHW.length===0&&<p style={{color:'var(--muted)',fontSize:'0.88rem'}}>No homework recorded yet.</p>}
        </Card>
        {recentActs.length>0&&(
          <Card>
            <h3 style={{fontSize:'1.2rem',marginBottom:'0.65rem'}}>Recent Activities</h3>
            <div style={{display:'flex',flexWrap:'wrap',gap:7}}>{recentActs.map(a=><Badge key={a} color="var(--navy)">{a}</Badge>)}</div>
          </Card>
        )}
        <Card style={{background:'var(--bg)',border:'2px solid var(--border)',padding:'0.75rem'}}>
          <p style={{fontSize:'0.78rem',color:'var(--muted)',textAlign:'center'}}>📞 Questions? Contact AFCLL Academy · <strong style={{color:'var(--navy)'}}>info@afclancaster.org</strong></p>
        </Card>
      </div>
    </div>
  );
}

// ── ADMIN DASHBOARD ──────────────────────────────────────────────────────────
function AdminDashboard({session,onLogout}){
  const [tab,setTab]=useState('confirm');
  const [students,setStudents]=useState(()=>lsGet('afcll_v2_students')||DEF_STUDENTS);
  const [staffList,setStaffList]=useState(()=>lsGet('afcll_v2_staff')||DEF_STAFF);
  const [att,setAtt]=useState(()=>lsGet('afcll_v2_att')||[]);
  const [hw]=useState(()=>lsGet('afcll_v2_hw')||[]);
  const [acts]=useState(()=>lsGet('afcll_v2_acts')||[]);
  const [selDate,setSelDate]=useState(today());
  const [toast,setToast]=useState('');
  const toast_show=(m)=>{setToast(m);setTimeout(()=>setToast(''),3000);};

  // ── New staff form
  const [newName,setNewName]=useState('');
  const [newUser,setNewUser]=useState('');
  const [newPin,setNewPin]=useState('');
  const [newRole,setNewRole]=useState('staff');
  const [staffErr,setStaffErr]=useState('');

  // ── New student form
  const [sName,setSName]=useState('');
  const [sGrade,setSGrade]=useState('6th');
  const [sPin,setSPin]=useState('');
  const [sUser,setSUser]=useState('');
  const [sPPin,setSPPin]=useState('');
  const [studErr,setStudErr]=useState('');

  const addStaff=()=>{
    setStaffErr('');
    if(!newName.trim()||!newUser.trim()||newPin.length<4){setStaffErr('Name, username, and 4-digit PIN required.');return;}
    const all=lsGet('afcll_v2_staff')||[];
    if(all.find(s=>s.username.toLowerCase()===newUser.toLowerCase())){setStaffErr('Username already exists.');return;}
    const s={id:'staff'+Date.now(),name:newName.trim(),username:newUser.trim().toLowerCase(),pin:newPin,role:newRole};
    const u=[...all,s];setStaffList(u);lsSet('afcll_v2_staff',u);
    setNewName('');setNewUser('');setNewPin('');setNewRole('staff');
    toast_show('\u2705 Staff member added!');
  };

  const removeStaff=(id)=>{
    if(id===session.user.id){toast_show('Cannot remove your own account.');return;}
    const u=(lsGet('afcll_v2_staff')||[]).filter(s=>s.id!==id);
    setStaffList(u);lsSet('afcll_v2_staff',u);toast_show('Staff member removed.');
  };

  const addStudent=()=>{
    setStudErr('');
    if(!sName.trim()||!sPin||sPin.length<4){setStudErr('Name and 4-digit PIN required.');return;}
    const all=lsGet('afcll_v2_students')||[];
    const auto=sName.trim().toLowerCase().replace(/\s+/,'').slice(0,12);
    const username=sUser.trim()||auto;
    if(all.find(s=>s.username.toLowerCase()===username.toLowerCase())){setStudErr('Username already exists.');return;}
    const s={id:'stu'+Date.now(),name:sName.trim(),grade:sGrade,pin:sPin,username,parentPin:sPPin||'p'+sPin};
    const u=[...all,s];setStudents(u);lsSet('afcll_v2_students',u);
    setSName('');setSPin('');setSUser('');setSPPin('');
    toast_show('\u2705 Student added!');
  };

  const removeStudent=(id)=>{
    const u=(lsGet('afcll_v2_students')||[]).filter(s=>s.id!==id);
    setStudents(u);lsSet('afcll_v2_students',u);toast_show('Student removed.');
  };

  // ── Attendance confirm (same as staff)
  const confirmAtt=(attId)=>{
    const u=att.map(a=>a.id===attId?{...a,confirmed:true,confirmedBy:session.user.name,confirmedAt:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}:a);
    setAtt(u);lsSet('afcll_v2_att',u);toast_show('\u2705 Confirmed!');
  };
  const unconfirmAtt=(attId)=>{
    const u=att.map(a=>a.id===attId?{...a,confirmed:false,confirmedBy:null}:a);
    setAtt(u);lsSet('afcll_v2_att',u);toast_show('Confirmation removed.');
  };
  const markPresent=(sid)=>{
    if(att.find(a=>a.studentId===sid&&a.date===selDate))return;
    const r={id:Date.now()+'',studentId:sid,date:selDate,time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),staffAdded:true,confirmed:true};
    const u=[...att,r];setAtt(u);lsSet('afcll_v2_att',u);
    const ms=students.find(x=>x.id===sid);
    if(ms) syncToSheets('logAttendance',{...r,studentName:ms.name,grade:ms.grade});
    toast_show('\u2705 Marked present!');
  };
  const pendingToday=att.filter(a=>a.date===today()&&!a.confirmed&&!a.staffAdded);
  const confirmedToday=att.filter(a=>a.date===today()&&(a.confirmed||a.staffAdded));

  const inputStyle={width:'100%',padding:'9px 12px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:'0.88rem',background:'var(--bg)',color:'var(--text)',outline:'none',boxSizing:'border-box'};

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',fontFamily:"'Barlow',sans-serif"}}>
      {toast&&<div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',background:'var(--navy)',color:'white',padding:'10px 20px',borderRadius:20,zIndex:9999,fontSize:'0.88rem',fontWeight:600,boxShadow:'0 4px 20px rgba(0,0,0,0.3)'}}>{toast}</div>}
      <div style={{background:'var(--navy)',padding:'0.875rem 1rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:'0.6rem'}}>
          <img src={LOGO} alt="" style={{width:34,height:34,objectFit:'contain'}}/>
          <div>
            <p style={{color:'var(--gold)',fontWeight:700,fontSize:'0.95rem',fontFamily:"'Barlow Condensed',sans-serif",lineHeight:1.1}}>ADMIN</p>
            <p style={{color:'rgba(255,255,255,0.6)',fontSize:'0.72rem',lineHeight:1}}>{session.user.name}</p>
          </div>
        </div>
        <Btn variant="ghost" size="sm" onClick={onLogout} style={{color:'rgba(255,255,255,0.6)',fontSize:'0.78rem'}}>Log out</Btn>
      </div>

      <div style={{display:'flex',gap:0,padding:'0 0.5rem',background:'var(--card)',borderBottom:'1px solid var(--border)',overflowX:'auto'}}>
        {[['confirm','\u23f3 Confirm'],['students','Students'],['staff','Staff'],['reports','Reports'],['settings','\u2699 Setup']].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:'0.75rem 0.9rem',border:'none',background:'none',cursor:'pointer',
            fontWeight:tab===t?700:400,color:tab===t?'var(--navy)':'var(--muted)',fontSize:'0.82rem',whiteSpace:'nowrap',
            borderBottom:tab===t?'3px solid var(--gold)':'3px solid transparent',fontFamily:"'Barlow',sans-serif"}}>
            {l}
          </button>
        ))}
      </div>

      <div style={{maxWidth:600,margin:'0 auto',padding:'1rem'}}>

        {/* ── CONFIRM TAB ── */}
        {tab==='confirm'&&(
          <div style={{display:'flex',flexDirection:'column',gap:'0.6rem'}}>
            <Card>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.75rem'}}>
                <h3 style={{fontSize:'1.2rem'}}>Today\u2019s Check-Ins</h3>
                <span style={{fontSize:'0.78rem',color:'var(--muted)'}}>{fmtDate(today())}</span>
              </div>
              {pendingToday.length===0&&confirmedToday.length===0&&(
                <p style={{textAlign:'center',color:'var(--muted)',fontSize:'0.85rem',padding:'1.5rem 0'}}>No check-ins yet today.</p>
              )}
              {pendingToday.length>0&&(
                <>
                  <div style={{background:'#fef3c7',borderRadius:8,padding:'0.55rem 0.875rem',marginBottom:'0.5rem'}}>
                    <span style={{fontSize:'0.82rem',fontWeight:700,color:'#92400e'}}>⏳ Pending ({pendingToday.length})</span>
                  </div>
                  {pendingToday.map(a=>{const s=students.find(x=>x.id===a.studentId);return s?(
                    <div key={a.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.65rem',background:'#fffbeb',borderRadius:8,marginBottom:6,border:'1.5px solid #fcd34d'}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <Avatar name={s.name} id={s.id} size={34}/>
                        <div><p style={{fontWeight:600,fontSize:'0.86rem'}}>{s.name}</p><p style={{color:'var(--muted)',fontSize:'0.74rem'}}>Gr {s.grade} · {a.time}</p></div>
                      </div>
                      <Btn variant="success" size="sm" onClick={()=>confirmAtt(a.id)}>✅ Confirm</Btn>
                    </div>
                  ):null;})}
                </>
              )}
              {confirmedToday.length>0&&(
                <>
                  <div style={{background:'#f0fdf4',borderRadius:8,padding:'0.55rem 0.875rem',marginTop:pendingToday.length?'0.75rem':0,marginBottom:'0.5rem'}}>
                    <span style={{fontSize:'0.82rem',fontWeight:700,color:'var(--success)'}}>✅ Confirmed ({confirmedToday.length})</span>
                  </div>
                  {confirmedToday.map(a=>{const s=students.find(x=>x.id===a.studentId);return s?(
                    <div key={a.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.65rem',background:'#f0fdf4',borderRadius:8,marginBottom:6,border:'1.5px solid #86efac'}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <Avatar name={s.name} id={s.id} size={34}/>
                        <div><p style={{fontWeight:600,fontSize:'0.86rem'}}>{s.name}</p><p style={{color:'var(--muted)',fontSize:'0.74rem'}}>{a.staffAdded?'Added by staff':'Confirmed'+(a.confirmedBy?' by '+a.confirmedBy:'')} · {a.confirmedAt||a.time}</p></div>
                      </div>
                      <Btn variant="ghost" size="sm" onClick={()=>unconfirmAtt(a.id)}>Undo</Btn>
                    </div>
                  ):null;})}
                </>
              )}
            </Card>
            <Card>
              <h3 style={{fontSize:'1.05rem',marginBottom:'0.5rem'}}>Not checked in today</h3>
              {students.filter(s=>!att.find(a=>a.studentId===s.id&&a.date===today())).map(s=>(
                <div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.6rem',background:'var(--bg)',borderRadius:8,marginBottom:5}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <Avatar name={s.name} id={s.id} size={30}/>
                    <span style={{fontSize:'0.84rem'}}>{s.name} · Gr {s.grade}</span>
                  </div>
                  <Btn variant="primary" size="sm" onClick={()=>markPresent(s.id)}>Mark Present</Btn>
                </div>
              ))}
              {students.filter(s=>!att.find(a=>a.studentId===s.id&&a.date===today())).length===0&&(
                <p style={{color:'var(--muted)',fontSize:'0.82rem',textAlign:'center',padding:'0.5rem'}}>All students accounted for.</p>
              )}
            </Card>
          </div>
        )}

        {/* ── STUDENTS TAB ── */}
        {tab==='students'&&(
          <div style={{display:'flex',flexDirection:'column',gap:'0.6rem'}}>
            <Card>
              <h3 style={{fontSize:'1.2rem',marginBottom:'0.875rem'}}>Add New Student</h3>
              {studErr&&<p style={{color:'#ef4444',fontSize:'0.8rem',marginBottom:'0.5rem'}}>{studErr}</p>}
              <div style={{display:'flex',flexDirection:'column',gap:'0.5rem'}}>
                <input style={inputStyle} placeholder="Full Name *" value={sName} onChange={e=>setSName(e.target.value)}/>
                <select style={inputStyle} value={sGrade} onChange={e=>setSGrade(e.target.value)}>
                  {['Pre-K','K','1st','2nd','3rd','4th','5th','6th','7th','8th','9th','10th','11th','12th'].map(g=><option key={g}>{g}</option>)}
                </select>
                <input style={inputStyle} placeholder="4-digit PIN *" value={sPin} onChange={e=>setSPin(e.target.value.replace(/\D/,'').slice(0,4))} maxLength={4}/>
                <input style={inputStyle} placeholder="Username (auto if blank)" value={sUser} onChange={e=>setSUser(e.target.value)}/>
                <input style={inputStyle} placeholder="Parent PIN (auto if blank)" value={sPPin} onChange={e=>setSPPin(e.target.value)}/>
                <Btn variant="primary" onClick={addStudent} style={{marginTop:4}}>+ Add Student</Btn>
              </div>
            </Card>
            <Card>
              <h3 style={{fontSize:'1.1rem',marginBottom:'0.6rem'}}>Enrolled Students ({students.length})</h3>
              {students.map(s=>(
                <div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.65rem',background:'var(--bg)',borderRadius:8,marginBottom:6}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <Avatar name={s.name} id={s.id} size={32}/>
                    <div>
                      <p style={{fontWeight:600,fontSize:'0.86rem'}}>{s.name}</p>
                      <p style={{color:'var(--muted)',fontSize:'0.74rem'}}>Gr {s.grade} · PIN: {s.pin} · @{s.username}</p>
                    </div>
                  </div>
                  <Btn variant="danger" size="sm" onClick={()=>removeStudent(s.id)}>Remove</Btn>
                </div>
              ))}
            </Card>
          </div>
        )}

        {/* ── STAFF TAB ── */}
        {tab==='staff'&&(
          <div style={{display:'flex',flexDirection:'column',gap:'0.6rem'}}>
            <Card>
              <h3 style={{fontSize:'1.2rem',marginBottom:'0.875rem'}}>Add Staff Member</h3>
              {staffErr&&<p style={{color:'#ef4444',fontSize:'0.8rem',marginBottom:'0.5rem'}}>{staffErr}</p>}
              <div style={{display:'flex',flexDirection:'column',gap:'0.5rem'}}>
                <input style={inputStyle} placeholder="Full Name *" value={newName} onChange={e=>setNewName(e.target.value)}/>
                <input style={inputStyle} placeholder="Username * (e.g. jsmith)" value={newUser} onChange={e=>setNewUser(e.target.value.replace(/\s/,''))}/>
                <input style={inputStyle} placeholder="4-digit PIN *" value={newPin} onChange={e=>setNewPin(e.target.value.replace(/\D/,'').slice(0,4))} maxLength={4}/>
                <select style={inputStyle} value={newRole} onChange={e=>setNewRole(e.target.value)}>
                  <option value="staff">Staff (can confirm attendance)</option>
                  <option value="admin">Admin (full access)</option>
                </select>
                <Btn variant="primary" onClick={addStaff} style={{marginTop:4}}>+ Add Staff Member</Btn>
              </div>
            </Card>
            <Card>
              <h3 style={{fontSize:'1.1rem',marginBottom:'0.6rem'}}>Staff Accounts ({staffList.length})</h3>
              {staffList.map(s=>(
                <div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.65rem',background:'var(--bg)',borderRadius:8,marginBottom:6}}>
                  <div>
                    <p style={{fontWeight:600,fontSize:'0.88rem'}}>{s.name} <span style={{fontSize:'0.72rem',background:s.role==='admin'?'var(--navy)':'#6b7280',color:'white',borderRadius:4,padding:'2px 7px',marginLeft:4}}>{s.role.toUpperCase()}</span></p>
                    <p style={{color:'var(--muted)',fontSize:'0.74rem'}}>@{s.username} · PIN: {s.pin}</p>
                  </div>
                  <Btn variant="danger" size="sm" onClick={()=>removeStaff(s.id)} disabled={s.id===session.user.id}>
                    {s.id===session.user.id?'(You)':'Remove'}
                  </Btn>
                </div>
              ))}
            </Card>
          </div>
        )}

        {/* ── REPORTS TAB (same as StaffDashboard) ── */}
        {tab==='reports'&&(
          <div style={{display:'flex',flexDirection:'column',gap:'0.6rem'}}>
            <Card style={{border:'3px solid var(--navy)'}}>
              <div style={{display:'flex',alignItems:'center',gap:'0.75rem',marginBottom:'0.75rem'}}>
                <div style={{background:'var(--navy)',borderRadius:8,padding:'8px 10px',flexShrink:0,fontSize:'1.4rem'}}>\ud83d\udccb</div>
                <div>
                  <h3 style={{fontSize:'1.25rem',color:'var(--navy)'}}>PA 21C DOE Compliance Export</h3>
                  <p style={{color:'var(--muted)',fontSize:'0.76rem'}}>Official PA 21st Century CCLC Daily Attendance Tracking Form (.xlsx)</p>
                </div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                <div>
                  <p style={{fontSize:'0.82rem'}}><strong>{students.length}</strong> students · <strong>{att.length}</strong> records</p>
                  <p style={{fontSize:'0.74rem',color:'var(--muted)'}}>AFCLL Academy · AFC Lancaster Lions Initiative</p>
                </div>
                <Btn variant="primary" size="lg" onClick={()=>exportDOEExcel(students,att,hw,acts)} style={{fontSize:'0.95rem',padding:'10px 18px'}}>⬇ Export DOE Excel</Btn>
              </div>
            </Card>
            <Card>
              <h3 style={{fontSize:'1.2rem',marginBottom:'0.5rem'}}>Quick CSV Exports</h3>
              {[['att','\ud83d\udcc5 Attendance','All check-ins with timestamps'],['hw','\ud83d\udcda Homework','Logs and completion status'],['acts','\ud83c\udfc6 Activities','Activity participation']].map(([t,l,d])=>(
                <div key={t} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.65rem',background:'var(--bg)',borderRadius:8,marginBottom:6}}>
                  <div><p style={{fontWeight:600,fontSize:'0.86rem'}}>{l}</p><p style={{color:'var(--muted)',fontSize:'0.76rem'}}>{d}</p></div>
                  <Btn variant="ghost" size="sm" onClick={()=>{
                    const data=t==='att'?att:t==='hw'?hw:acts;
                    const csv=Object.keys(data[0]||{}).join(',')+'\'\n'+data.map(r=>Object.values(r).join(',')).join('\'\n');
                    const a=document.createElement('a');a.href='data:text/csv,'+encodeURIComponent(csv);a.download=t+'_export.csv';a.click();
                  }}>Export CSV</Btn>
                </div>
              ))}
            </Card>
          </div>
        )}

        {/* ── SETUP TAB ── */}
        {tab==='settings'&&<SheetsSetup students={students}/>}

      </div>
    </div>
  );
}


// ── ROOT ─────────────────────────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  useEffect(()=>{initData();},[]);
  if(!session) return <LoginScreen onLogin={setSession}/>;
  if(session.role==='student') return <StudentDashboard session={session} onLogout={()=>setSession(null)}/>;
  if(session.role==='staff') return <StaffDashboard session={session} onLogout={()=>setSession(null)}/>;
  if(session.role==='admin') return <AdminDashboard session={session} onLogout={()=>setSession(null)}/>;
  if(session.role==='parent') return <ParentDashboard session={session} onLogout={()=>setSession(null)}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
